<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Park World</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; }
      #renderCanvas {
        width: 100vw; height: 100vh;
        display: block; touch-action: none;
      }
      #joy-zone {
        position: fixed; bottom: 24px; left: 20px;
        width: 140px; height: 140px;
        border-radius: 50%;
        border: 2px dashed rgba(255,255,255,0.3);
        pointer-events: all;
        display: none;
      }
      #btn-flap {
        position: fixed; bottom: 110px; right: 24px;
        width: 60px; height: 60px; border-radius: 50%;
        background: rgba(255,255,255,0.15);
        border: 2px solid rgba(255,255,255,0.4);
        color: white; font-size: 11px; font-weight: bold;
        display: none; align-items: center; justify-content: center;
        cursor: pointer; user-select: none;
      }
      #btn-egg {
        position: fixed; bottom: 190px; right: 24px;
        width: 60px; height: 60px; border-radius: 50%;
        background: rgba(255,200,50,0.2);
        border: 2px solid rgba(255,200,50,0.5);
        color: white; font-size: 11px; font-weight: bold;
        display: none; align-items: center; justify-content: center;
        cursor: pointer; user-select: none;
      }
      #btn-rocket {
        position: fixed; bottom: 270px; right: 24px;
        width: 60px; height: 60px; border-radius: 50%;
        background: rgba(255,100,50,0.2);
        border: 2px solid rgba(255,100,50,0.5);
        color: white; font-size: 11px; font-weight: bold;
        display: none; align-items: center; justify-content: center;
        cursor: pointer; user-select: none;
      }
      #hud {
        position: fixed; top: 16px; left: 16px;
        color: white; font-family: monospace; font-size: 12px;
        pointer-events: none;
        text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      }
      #chat-bar {
        display: none;
        position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
        width: min(480px, 90vw);
        background: rgba(0,0,0,0.72);
        border: 2px solid rgba(255,255,255,0.28);
        border-radius: 14px;
        padding: 10px 18px 12px;
        flex-direction: column; gap: 4px;
        z-index: 100;
      }
      #chat-hint {
        color: rgba(255,255,255,0.45);
        font-family: monospace; font-size: 11px;
        letter-spacing: 0.04em;
      }
      #chat-input {
        background: transparent; border: none; outline: none;
        color: #fff; caret-color: #fff;
        font-family: monospace; font-size: 22px;
        width: 100%;
      }
      #chat-input::placeholder { color: rgba(255,255,255,0.3); }
      #name-overlay {
        display: none;
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.85);
        align-items: center; justify-content: center;
        z-index: 200;
      }
      #name-card {
        display: flex; flex-direction: column; gap: 16px;
        background: rgba(20,20,30,0.95);
        border: 2px solid rgba(255,255,255,0.22);
        border-radius: 16px;
        padding: 32px 36px 28px;
        min-width: 280px;
      }
      #name-title {
        color: rgba(255,255,255,0.7);
        font-family: monospace; font-size: 13px;
        letter-spacing: 0.08em; text-transform: lowercase;
      }
      #name-input {
        background: transparent; border: none;
        border-bottom: 2px solid rgba(255,255,255,0.35);
        outline: none; color: #fff; caret-color: #fff;
        font-family: monospace; font-size: 28px;
        padding-bottom: 6px; width: 100%;
      }
      #name-input::placeholder { color: rgba(255,255,255,0.2); }
      #name-submit {
        align-self: flex-end;
        background: rgba(255,255,255,0.1);
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 8px;
        color: #fff; font-family: monospace; font-size: 14px;
        padding: 8px 20px; cursor: pointer;
        transition: background 0.15s;
      }
      #name-submit:hover { background: rgba(255,255,255,0.2); }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="joy-zone"></div>
    <div id="btn-flap">FLAP</div>
    <div id="btn-egg">EGG</div>
    <div id="btn-rocket">🚀</div>
    <div id="hud"></div>
    <div id="name-overlay">
      <div id="name-card">
        <div id="name-title">what's your name?</div>
        <input id="name-input" type="text" maxlength="14" autocomplete="off" spellcheck="false" placeholder="bird" />
        <button id="name-submit">fly →</button>
      </div>
    </div>
    <div id="chat-bar">
      <div id="chat-hint">T to chat · Enter to send · Esc to cancel</div>
      <input id="chat-input" type="text" maxlength="60" autocomplete="off" placeholder="say something..." />
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // Show mobile controls if touch device
      if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
        document.getElementById('joy-zone').style.display = 'block'
        document.getElementById('btn-flap').style.display  = 'flex'
        document.getElementById('btn-egg').style.display   = 'flex'
        document.getElementById('btn-rocket').style.display = 'flex'
      }
    </script>
  </body>
</html>
